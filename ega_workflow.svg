<svg viewBox="0 0 680 810" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif" font-size="13">
  <title>EGA Submission Workflow</title>
  <desc>Step-by-step flowchart of the EGA data submission process.</desc>

  <!-- legend -->
  <rect x="10" y="10" width="12" height="12" rx="2" fill="#4A90D9"/>
  <text x="26" y="21" fill="#222" font-size="11">One-time setup</text>
  <rect x="140" y="10" width="12" height="12" rx="2" fill="#7CB87C"/>
  <text x="156" y="21" fill="#222" font-size="11">Repeat per batch</text>
  <rect x="280" y="10" width="12" height="12" rx="2" fill="#E8A838"/>
  <text x="296" y="21" fill="#222" font-size="11">Portal (manual)</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#999"/>
    </marker>
    <marker id="arr-loop" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7CB87C"/>
    </marker>
  </defs>

  <!-- repeat bracket -->
  <rect x="34" y="176" width="3" height="610" rx="1" fill="#7CB87C" opacity="0.4"/>
  <text x="22" y="481" text-anchor="middle" fill="#7CB87C" font-size="11" font-weight="600" transform="rotate(-90,22,481)">REPEAT PER BATCH</text>

  <!-- 1 -->
  <rect x="190" y="40" width="300" height="60" rx="8" fill="#4A90D9"/>
  <text x="340" y="62" text-anchor="middle" fill="white" font-weight="600">1. List files to upload</text>
  <rect x="200" y="70" width="280" height="20" rx="4" fill="#1a5fa8"/>
  <text x="340" y="84" text-anchor="middle" fill="#b8d4f5" font-size="10" font-family="monospace">data_paths/bam.list.eso01.txt</text>
  <line x1="340" y1="100" x2="340" y2="118" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2 -->
  <rect x="190" y="118" width="300" height="60" rx="8" fill="#4A90D9"/>
  <text x="340" y="140" text-anchor="middle" fill="white" font-weight="600">2. Split into &lt;10 TB batches</text>
  <rect x="200" y="148" width="280" height="20" rx="4" fill="#1a5fa8"/>
  <text x="340" y="162" text-anchor="middle" fill="#b8d4f5" font-size="10" font-family="monospace">python split_by_size.py bam.list.eso01.txt</text>
  <line x1="340" y1="178" x2="340" y2="196" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3 -->
  <rect x="190" y="196" width="300" height="60" rx="8" fill="#7CB87C"/>
  <text x="340" y="218" text-anchor="middle" fill="white" font-weight="600">3. Encrypt batch</text>
  <rect x="200" y="226" width="280" height="20" rx="4" fill="#3a7a3a"/>
  <text x="340" y="240" text-anchor="middle" fill="#c8ecc8" font-size="10" font-family="monospace">sbatch --array=1 Upload_batch.sh eso01</text>
  <line x1="340" y1="256" x2="340" y2="274" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 4 -->
  <rect x="190" y="274" width="300" height="48" rx="8" fill="#7CB87C"/>
  <text x="340" y="294" text-anchor="middle" fill="white" font-weight="600">4. Upload via Globus</text>
  <text x="340" y="312" text-anchor="middle" fill="#e8f5e8" font-size="11">Wait for confirmation email (~1 GB/hour)</text>

  <!-- fork -->
  <line x1="340" y1="322" x2="340" y2="340" stroke="#999" stroke-width="1.5"/>
  <line x1="210" y1="340" x2="470" y2="340" stroke="#999" stroke-width="1.5"/>
  <line x1="210" y1="340" x2="210" y2="358" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="470" y1="340" x2="470" y2="358" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="210" y="354" text-anchor="middle" fill="#888" font-size="10">first batch</text>
  <text x="470" y="354" text-anchor="middle" fill="#888" font-size="10">remaining batches</text>

  <!-- 5a -->
  <rect x="75" y="358" width="260" height="160" rx="8" fill="#E8A838"/>
  <text x="205" y="378" text-anchor="middle" fill="white" font-weight="600">5a. Register metadata in portal</text>
  <text x="205" y="396" text-anchor="middle" fill="#fdf3e0" font-size="11">Study · Samples · Experiments</text>
  <text x="205" y="412" text-anchor="middle" fill="#fdf3e0" font-size="11">Dataset · First analysis (sanity check)</text>
  <text x="205" y="428" text-anchor="middle" fill="#fdf3e0" font-size="10">submission.ega-archive.org</text>
  <line x1="85" y1="438" x2="325" y2="438" stroke="#f0c070" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="205" y="454" text-anchor="middle" fill="#fdf3e0" font-size="11">Link analysis to dataset</text>
  <text x="205" y="470" text-anchor="middle" fill="#fdf3e0" font-size="10">Under the dataset tab in portal</text>
  <text x="205" y="486" text-anchor="middle" fill="#fdf3e0" font-size="10">submission.ega-archive.org</text>

  <!-- 5b -->
  <rect x="345" y="358" width="255" height="60" rx="8" fill="#7CB87C"/>
  <text x="472" y="378" text-anchor="middle" fill="white" font-weight="600">5b. Register via script</text>
  <rect x="355" y="386" width="235" height="20" rx="4" fill="#3a7a3a"/>
  <text x="472" y="400" text-anchor="middle" fill="#c8ecc8" font-size="10" font-family="monospace">python Register_metadata.py eso01_batch2</text>
  <line x1="472" y1="418" x2="472" y2="436" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 5c -->
  <rect x="345" y="436" width="255" height="48" rx="8" fill="#E8A838"/>
  <text x="472" y="456" text-anchor="middle" fill="white" font-weight="600">5c. Link analysis to dataset</text>
  <text x="472" y="474" text-anchor="middle" fill="#fdf3e0" font-size="10">Manually in Submitter Portal</text>

  <!-- merge -->
  <line x1="205" y1="518" x2="205" y2="536" stroke="#999" stroke-width="1.5"/>
  <line x1="472" y1="484" x2="472" y2="536" stroke="#999" stroke-width="1.5"/>
  <line x1="205" y1="536" x2="472" y2="536" stroke="#999" stroke-width="1.5"/>
  <line x1="340" y1="536" x2="340" y2="554" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 6 -->
  <rect x="190" y="554" width="300" height="100" rx="8" fill="#E8A838"/>
  <text x="340" y="574" text-anchor="middle" fill="white" font-weight="600">6. Finalise submission</text>
  <text x="340" y="592" text-anchor="middle" fill="#fdf3e0" font-size="11">Triggers ingestion (up to 48h)</text>
  <text x="340" y="608" text-anchor="middle" fill="#fdf3e0" font-size="10">You can keep adding analyses after finalising</text>
  <line x1="200" y1="618" x2="480" y2="618" stroke="#f0c070" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="340" y="634" text-anchor="middle" fill="#fdf3e0" font-size="10" font-style="italic">💡 Finalise early to get an accession number.</text>
  <text x="340" y="648" text-anchor="middle" fill="#fdf3e0" font-size="10" font-style="italic">Dataset stays private until you request otherwise.</text>

  <line x1="340" y1="654" x2="340" y2="674" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 7 -->
  <rect x="190" y="674" width="300" height="48" rx="8" fill="#7CB87C"/>
  <text x="340" y="694" text-anchor="middle" fill="white" font-weight="600">7. Verify files in archive</text>
  <text x="340" y="712" text-anchor="middle" fill="#e8f5e8" font-size="11">submission.ega-archive.org/files/archive</text>
  <line x1="340" y1="722" x2="340" y2="742" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 8 -->
  <rect x="190" y="742" width="300" height="48" rx="8" fill="#7CB87C"/>
  <text x="340" y="762" text-anchor="middle" fill="white" font-weight="600">8. Delete encrypted data from cluster</text>
  <text x="340" y="780" text-anchor="middle" fill="#e8f5e8" font-size="11">Free up space for next batch</text>

  <!-- loop arrow -->
  <path d="M490,762 Q610,762 610,256 Q610,216 490,216" stroke="#7CB87C" stroke-width="1.5" fill="none" marker-end="url(#arr-loop)" stroke-dasharray="5,3"/>
  <text x="618" y="500" fill="#7CB87C" font-size="11" font-weight="600" transform="rotate(90,618,500)">next batch</text>

</svg>
